<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bean Chat V6.1 ☕</title>
<meta name="description" content="Ronald's Coffee Shop - Always Warm">
<meta name="theme-color" content="#8D6E63">
<style>
:root{--coffee-dark:#3E2723;--coffee-med:#5D4037;--coffee-light:#8D6E63;--cream:#EFEBE9;--white:#FFF;--accent:#D7CCC8;--text-main:#3E2723;--text-light:#795548;--success:#4CAF50;--shadow:0 4px 12px rgba(62,39,35,.15);--radius:16px;--nav-height:70px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--cream);color:var(--text-main);height:100vh;display:flex;flex-direction:column;overflow:hidden}
header{background:var(--white);padding:1rem;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.05);z-index:10;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.brand{font-weight:700;font-size:1.2rem;color:var(--coffee-med);display:flex;align-items:center;gap:8px}
#user-display{font-size:.9rem;font-weight:600;color:var(--text-light)}
main{flex:1;overflow-y:auto;padding:1rem}
.view{display:none;animation:fadeIn .3s ease}
.view.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.welcome-card{background:var(--white);padding:2rem;border-radius:var(--radius);text-align:center;box-shadow:var(--shadow);margin:2rem auto;max-width:400px}
input[type=text]{width:100%;padding:14px;border:2px solid var(--accent);border-radius:12px;font-size:1rem;margin:1rem 0;background:var(--white);color:var(--text-main);font-family:inherit;outline:none}
input[type=text]:focus{border-color:var(--coffee-light)}
.btn{background:var(--coffee-med);color:#fff;border:none;padding:14px 24px;border-radius:50px;font-size:1rem;cursor:pointer;width:100%;font-weight:600;font-family:inherit}
.btn:active{opacity:.85}
.btn-secondary{background:transparent;color:var(--coffee-light);border:1px solid var(--coffee-light);padding:6px 12px;font-size:.85rem;width:auto}
.lock-control{display:flex;justify-content:center;gap:10px;margin-top:10px;font-size:.9rem;color:var(--text-light)}
.chat-container{display:flex;flex-direction:column;height:100%;max-width:800px;margin:0 auto}
.messages{flex:1;overflow-y:auto;padding:1rem 0;display:flex;flex-direction:column;gap:8px}
.message{background:var(--white);padding:12px 16px;border-radius:16px;box-shadow:0 1px 3px rgba(0,0,0,.1);max-width:85%;word-wrap:break-word}
.message.mine{background:var(--coffee-light);color:#fff;align-self:flex-end;margin-left:auto}
.input-area{display:flex;gap:10px;padding:12px 0;border-top:1px solid var(--accent);align-items:center}
.input-area input{flex:1;border-radius:25px;padding:12px 18px;border:2px solid var(--accent);background:var(--white);color:var(--text-main);font-size:1rem;outline:none;font-family:inherit}
.input-area input:focus{border-color:var(--coffee-light)}
.input-area .btn{width:50px;height:50px;padding:0;border-radius:50%;flex-shrink:0;font-size:1.1rem;display:flex;align-items:center;justify-content:center}
nav{height:var(--nav-height);background:var(--cream);display:flex;justify-content:space-around;align-items:center;border-top:1px solid var(--accent);flex-shrink:0}
.nav-item{background:none;border:none;font-size:1.5rem;color:var(--text-light);cursor:pointer;padding:8px}
.nav-item.active{color:var(--coffee-med)}
footer{text-align:center;font-size:.75rem;color:var(--text-light);padding:12px;background:var(--cream);opacity:.8;flex-shrink:0}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;justify-content:center;align-items:center;z-index:200}
.modal-overlay.active{display:flex}
.modal-content{background:#fff;padding:2rem;border-radius:var(--radius);width:90%;max-width:420px;position:relative}
.modal-close{position:absolute;top:1rem;right:1rem;background:none;border:none;font-size:1.4rem;cursor:pointer;color:var(--text-light);line-height:1}
.setting-item{display:flex;justify-content:space-between;align-items:center;padding:1rem 0;border-bottom:1px solid var(--accent)}
.setting-item:last-child{border-bottom:none}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--coffee-dark);color:#fff;padding:12px 24px;border-radius:25px;z-index:300;white-space:nowrap}
</style>
</head>
<body>
<header><div class="brand">☕ Bean Chat</div><div id="user-display">Guest</div></header>
<main id="app-container">

<section id="view-welcome" class="view active">
  <div class="welcome-card">
    <h2>Step Inside ☕</h2>
    <p>Welcome to Ronald's Coffee Shop</p>
    <input type="text" id="username-input" placeholder="What should we call you?" maxlength="15">
    <div class="lock-control"><span id="lock-status">🔓 Unlocked</span><button id="toggle-lock" class="btn-secondary">Toggle Lock</button></div>
    <br>
    <button class="btn" onclick="app.enterShop()">Enter Shop</button>
  </div>
</section>

<section id="view-floor" class="view">
  <div class="chat-container">
    <div class="messages" id="floor-messages">
      <div class="message">Welcome to the Main Floor! ☕</div>
    </div>
    <div class="input-area">
      <input type="text" id="floor-input" placeholder="Say something..." autocomplete="off">
      <button class="btn" onclick="app.sendMessage()">➤</button>
    </div>
  </div>
</section>

</main>
<nav>
  <button class="nav-item active" id="nav-home" onclick="app.navigate('view-floor')">🏠</button>
  <button class="nav-item" onclick="app.openSettings()">⚙️</button>
</nav>
<footer>In loving memory of Dad · Always warm</footer>

<div class="modal-overlay" id="settings-modal">
  <div class="modal-content">
    <button class="modal-close" onclick="app.closeSettings()">✕</button>
    <h3 style="color:var(--coffee-med);margin-bottom:1rem">⚙️ Settings</h3>
    <div class="setting-item">
      <div>
        <div style="font-weight:600">Name Lock</div>
        <div style="font-size:.85rem;color:var(--text-light)">Prevent name changes</div>
      </div>
      <div class="toggle-switch" id="lock-toggle" onclick="app.toggleLock()"></div>
    </div>
    <div style="margin-top:1.5rem;text-align:center">
      <button class="btn" style="background:var(--coffee-dark);max-width:200px" onclick="app.clearData()">🗑 Reset Data</button>
    </div>
  </div>
</div>

<script>
const app = {
  state: { user:'', locked:false, currentView:'view-welcome' },

  init() {
    const u = localStorage.getItem('beanUser');
    if (u) { this.state.user=u; userDisplay.innerText=u; usernameInput.value=u; }
    const lk = localStorage.getItem('beanLock');
    if (lk==='true') { this.state.locked=true; this.updateLockUI(); }

    // Enter key support
    usernameInput.addEventListener('keypress', e => { if(e.key==='Enter') this.enterShop(); });
    floorInput.addEventListener('keypress', e => { if(e.key==='Enter') this.sendMessage(); });

    // Close settings when tapping backdrop
    settingsModal.addEventListener('click', e => { if(e.target===settingsModal) this.closeSettings(); });

    // History API - back/forward arrow navigation
    window.addEventListener('popstate', e => {
      const view = (e.state && e.state.view) ? e.state.view : 'view-welcome';
      this._showView(view);
    });

    // Push initial state
    history.replaceState({ view: this.state.currentView }, '', '');
  },

  _showView(id) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    const el = document.getElementById(id);
    if (el) el.classList.add('active');
    this.state.currentView = id;
    // Close modal if open
    settingsModal.classList.remove('active');
  },

  navigate(id) {
    if (id === this.state.currentView) return;
    this._showView(id);
    history.pushState({ view: id }, '', '');
  },

  enterShop() {
    const n = usernameInput.value.trim();
    if (!n) { this.toast('Tell us your name ☕'); usernameInput.focus(); return; }
    if (!this.state.locked) {
      this.state.user = n;
      localStorage.setItem('beanUser', n);
      userDisplay.innerText = n;
    }
    this.navigate('view-floor');
  },

  sendMessage() {
    const t = floorInput.value.trim();
    if (!t) return;
    this.playPing();
    const d = document.createElement('div');
    d.className = 'message mine';
    d.innerText = t;
    floorMessages.appendChild(d);
    floorInput.value = '';
    floorMessages.scrollTop = floorMessages.scrollHeight;
  },

  getCtx() {
    if (!this._ctx) this._ctx = new (window.AudioContext || window.webkitAudioContext)();
    return this._ctx;
  },

  playPing() {
    const ctx = this.getCtx();
    const go = () => {
      const now = ctx.currentTime;
      const mg = ctx.createGain();
      mg.connect(ctx.destination);
      mg.gain.setValueAtTime(0, now);
      mg.gain.linearRampToValueAtTime(0.55, now + .003);
      mg.gain.exponentialRampToValueAtTime(.001, now + 1.1);
      const o1 = ctx.createOscillator(); o1.type='sine'; o1.frequency.setValueAtTime(1396,now); o1.connect(mg); o1.start(now); o1.stop(now+1.1);
      const g2 = ctx.createGain(); g2.connect(ctx.destination); g2.gain.setValueAtTime(.25,now); g2.gain.exponentialRampToValueAtTime(.001,now+.55);
      const o2 = ctx.createOscillator(); o2.type='sine'; o2.frequency.setValueAtTime(2093,now); o2.connect(g2); o2.start(now); o2.stop(now+.55);
      const g3 = ctx.createGain(); g3.connect(ctx.destination); g3.gain.setValueAtTime(.1,now); g3.gain.exponentialRampToValueAtTime(.001,now+.25);
      const o3 = ctx.createOscillator(); o3.type='sine'; o3.frequency.setValueAtTime(3136,now); o3.connect(g3); o3.start(now); o3.stop(now+.25);
    };
    ctx.state==='suspended' ? ctx.resume().then(go) : go();
  },

  openSettings() {
    settingsModal.classList.add('active');
    // Push a history state so back arrow closes modal
    history.pushState({ view: this.state.currentView, modal:'settings' }, '', '');
  },

  closeSettings() {
    settingsModal.classList.remove('active');
  },

  toggleLock() {
    this.state.locked = !this.state.locked;
    localStorage.setItem('beanLock', this.state.locked);
    this.updateLockUI();
    this.toast(this.state.locked ? '🔒 Name locked' : '🔓 Name unlocked');
  },

  updateLockUI() {
    lockStatus.innerText = this.state.locked ? '🔒 Locked' : '🔓 Unlocked';
    usernameInput.disabled = this.state.locked;
    lockToggle.classList.toggle('active', this.state.locked);
  },

  clearData() {
    if (confirm('Reset all data? This cannot be undone.')) { localStorage.clear(); location.reload(); }
  },

  toast(m) {
    const existing = document.querySelector('.toast');
    if (existing) existing.remove();
    const t = document.createElement('div'); t.className='toast'; t.innerText=m;
    document.body.appendChild(t); setTimeout(()=>t.remove(), 2000);
  }
};

const usernameInput = document.getElementById('username-input'),
      userDisplay   = document.getElementById('user-display'),
      floorInput    = document.getElementById('floor-input'),
      floorMessages = document.getElementById('floor-messages'),
      settingsModal = document.getElementById('settings-modal'),
      lockStatus    = document.getElementById('lock-status'),
      lockToggle    = document.getElementById('lock-toggle');

// Toggle lock button on welcome screen
document.getElementById('toggle-lock').onclick = () => app.toggleLock();

document.addEventListener('DOMContentLoaded', () => app.init());
</script>
</body>
</html>
